<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.thingspeak.com;">
    <title>Dashboard</title>
    <link rel="stylesheet" href="styles.css">

    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="dashboard-container">
        <header class="cabecalho">
            <h1>Monitoramento</h1>
            <div class="header-acoes">
                <button id="btn-theme" class="btn-icone" title="Alternar Tema">🌓</button>
                <button id="btn-export" class="btn-icone" title="Exportar Dados (CSV)">📥</button>
                <button id="btn-settings" class="btn-icone" title="Configurações">⚙️</button>
                <div id="status-conexao" class="status-badge" aria-live="polite">Conectando...</div>
            </div>
        </header>

        <div class="grid-valores">
            <!-- Card Temperatura -->
            <div class="card-valor" id="card-temp">
                <div class="card-titulo">Temperatura</div>
                <div class="valor-principal-container">
                    <div id="txt-temp" class="valor-principal">--</div>
                    <span class="unidade">°C</span>
                </div>
                <div class="min-max">
                    <span id="max-temp" class="max">↑ --</span>
                    <span id="min-temp" class="min">↓ --</span>
                </div>
            </div>

            <!-- Card Umidade -->
            <div class="card-valor" id="card-umid">
                <div class="card-titulo">Umidade</div>
                <div class="valor-principal-container">
                    <div id="txt-umid" class="valor-principal">--</div>
                    <span class="unidade">%</span>
                </div>
                <div class="min-max">
                    <span id="max-umid" class="max">↑ --</span>
                    <span id="min-umid" class="min">↓ --</span>
                </div>
            </div>

            <!-- Card VPD -->
            <div class="card-valor" id="card-vpd">
                <div class="card-titulo">
                    VPD (Déficit de Pressão)
                    <span class="tooltip-icon"
                        title="Indica o potencial de transpiração da planta. Clones (0.4-0.8), Vegetativo (0.8-1.2), Floração (1.2-1.5).">ℹ️</span>
                </div>
                <div class="valor-principal-container" aria-live="polite">
                    <div id="txt-vpd" class="valor-principal">--</div>
                    <span class="unidade">kPa</span>
                </div>
                <div class="min-max">
                    <span id="max-vpd" class="max">↑ --</span>
                    <span id="min-vpd" class="min">↓ --</span>
                </div>
            </div>

            <!-- Card CO2 -->
            <div class="card-valor" id="card-co2">
                <div class="card-titulo">CO2</div>
                <div class="valor-principal-container">
                    <div id="txt-co2" class="valor-principal">--</div>
                    <span class="unidade">ppm</span>
                </div>
                <div class="min-max">
                    <span id="max-co2" class="max">↑ --</span>
                    <span id="min-co2" class="min">↓ --</span>
                </div>
            </div>
        </div>

        <div class="controles-wrapper">
            <div class="grafico-controles metricas">
                <button class="btn-grafico ativo" data-tipo="temp" aria-pressed="true">Temperatura</button>
                <button class="btn-grafico" data-tipo="umid" aria-pressed="false">Umidade</button>
                <button class="btn-grafico" data-tipo="vpd" aria-pressed="false">VPD</button>
                <button class="btn-grafico" data-tipo="co2" aria-pressed="false">CO2</button>
            </div>
            <div class="grafico-controles tempo">
                <button class="btn-tempo" data-res="72" aria-pressed="false">6h</button>
                <button class="btn-tempo" data-res="144" aria-pressed="false">12h</button>
                <button class="btn-tempo ativo" data-res="288" aria-pressed="true">24h</button>
                <button class="btn-tempo" data-res="576" aria-pressed="false">48h</button>
                <button class="btn-tempo" data-res="2016" aria-pressed="false">7d</button>
            </div>
        </div>

        <div id="controles-vpd" class="controles-wrapper" style="display: none; justify-content: center; margin-bottom: 15px;">
            <div class="grafico-controles estagios">
                <span style="color: var(--text-muted); font-size: 0.9rem; align-self: center; margin-right: 10px;">Estágio da Planta:</span>
                <button class="btn-estagio" data-min="0.4" data-max="0.8">Broto / Clone</button>
                <button class="btn-estagio" data-min="0.8" data-max="1.2">Vegetativo</button>
                <button class="btn-estagio" data-min="1.0" data-max="1.5">Floração</button>
            </div>
        </div>

        <div class="grafico-wrapper">
            <div id="loading-overlay" class="loading-overlay">
                <div class="spinner"></div>
            </div>
            <canvas id="meuGrafico"></canvas>
        </div>

        <div class="rodape">
            <div id="ultima-att">Última atualização: --</div>
        </div>
    </div>

    <!-- Modal de Configurações -->
    <div id="modal-settings" class="modal-backdrop" style="display: none;">
        <div class="modal-content">
            <h2>Configurar Zonas Ideais</h2>
            <div class="modal-form">
                <div class="form-group">
                    <label for="input-vpd-min">VPD Mínimo (kPa):</label>
                    <input type="number" id="input-vpd-min" step="0.1">
                </div>
                <div class="form-group">
                    <label for="input-vpd-max">VPD Máximo (kPa):</label>
                    <input type="number" id="input-vpd-max" step="0.1">
                </div>
                <div class="form-group">
                    <label for="input-co2-min">CO2 Mínimo (ppm):</label>
                    <input type="number" id="input-co2-min" step="10">
                </div>
                <div class="form-group">
                    <label for="input-co2-max">CO2 Máximo (ppm):</label>
                    <input type="number" id="input-co2-max" step="10">
                </div>
            </div>
            <div class="modal-acoes">
                <button id="btn-modal-cancel" class="btn-grafico">Cancelar</button>
                <button id="btn-modal-save" class="btn-grafico ativo">Salvar Alterações</button>
            </div>
        </div>
    </div>

    <!-- Chart.js e Plugin de Anotações -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1" integrity="sha384-jb8JQMbMoBUzgWatfe6COACi2ljcDdZQ2OxczGA3bGNeWe+6DChMTBJemed7ZnvJ" crossorigin="anonymous"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.2.1/dist/chartjs-plugin-annotation.min.js" integrity="sha384-cu6A/ZMsqLbWFlYSPeNOQ7QqrB6w0y2aspFO9/KW8SQDoXiM043mLkXYKaRpiAQl" crossorigin="anonymous"></script>

    <script src="utils.js"></script>
    <script src="script.js"></script>
</body>

</html>
